<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeLens AI</title>

<style>
body{
margin:0;
background:#050505;
font-family:Segoe UI,Arial,sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:900px;
background:#111;
border:2px solid gold;
border-radius:20px;
padding:30px;
box-shadow:0 0 40px gold;
text-align:center;
}

h1{
color:gold;
font-size:48px;
margin-bottom:10px;
}

.uploadBox{
border:3px dashed gold;
padding:30px;
border-radius:20px;
margin:20px 0;
}

button{
background:gold;
color:black;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px gold;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

img{
max-width:300px;
border-radius:15px;
margin:15px;
border:2px solid gold;
}

.slider{
width:80%;
}

.status{
margin-top:10px;
color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<h1>🔮 TimeLens AI</h1>
<p>Upload a photo and see a future version</p>

<div class="uploadBox">

<input type="file" id="imageInput" accept="image/*">

<br><br>

<label>Years Ahead</label><br>
<input class="slider" type="range" min="5" max="50" value="20" id="yearSlider">
<h2 id="yearText">20 Years</h2>

<br>

<button id="predictButton">Generate Future</button>

<div class="status" id="statusText"></div>

</div>

<div>
<h2>Original</h2>
<img id="originalImage">

<h2>Future</h2>
<img id="futureImage">
</div>

</div>

<script>

const MODEL_URL = "/api/future";

const imageInput = document.getElementById("imageInput");
const originalImage = document.getElementById("originalImage");
const futureImage = document.getElementById("futureImage");
const yearSlider = document.getElementById("yearSlider");
const yearText = document.getElementById("yearText");
const predictButton = document.getElementById("predictButton");
const statusText = document.getElementById("statusText");

let selectedFile = null;

// upload image
imageInput.addEventListener("change", () => {
    selectedFile = imageInput.files[0];

    if (selectedFile) {
        originalImage.src = URL.createObjectURL(selectedFile);
        statusText.textContent = "Image loaded ✔";
    }
});

// slider update
yearSlider.addEventListener("input", () => {
    yearText.textContent = yearSlider.value + " Years";
});

// generate future
predictButton.addEventListener("click", async () => {

    if (!selectedFile) {
        alert("Please upload an image first.");
        return;
    }

    predictButton.disabled = true;
    predictButton.textContent = "Generating...";
    statusText.textContent = "AI is working...";

    try {

        const formData = new FormData();
        formData.append("image", selectedFile);
        formData.append("years", yearSlider.value);

        const response = await fetch(MODEL_URL, {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            throw new Error("API failed");
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        futureImage.src = url;

        statusText.textContent = "Done ✔";

    } catch (err) {
        console.error(err);
        statusText.textContent = "Error ❌ Check Vercel API";
        alert("Something broke. Check your /api/future backend.");
    }

    predictButton.disabled = false;
    predictButton.textContent = "Generate Future";
});

</script>

</body>
</html>
